name: UPSC Mains Bot

on:
  schedule:
    # Runs at 02:30 UTC (08:00 AM IST) every day
    - cron: '30 2 * * *'
    # Runs at 07:30 UTC (01:00 PM IST) every day
    - cron: '30 7 * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai

      - name: Determine Mode and Run Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          HOUR=$(date -u +"%H")
          # If UTC hour is 2 (morning schedule), pass 'questions', else 'answers'
          if [ "$HOUR" -eq "02" ] || [ "$HOUR" -eq "03" ]; then
            python bot.py questions
          else
            python bot.py answers
          fi
