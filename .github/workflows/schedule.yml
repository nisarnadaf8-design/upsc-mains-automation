name: UPSC Mains Bot

on:
  schedule:
    # 02:30 UTC = 08:00 AM IST (Questions)
    - cron: '30 2 * * *'
    # 07:30 UTC = 01:00 PM IST (Answers)
    - cron: '30 7 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai

      - name: Run the Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          HOUR=$(date -u +"%H")
          # If UTC hour is 02 or 03 (Morning IST), send questions
          if [ "$HOUR" -eq "02" ] || [ "$HOUR" -eq "03" ]; then
            python bot.py questions
          else
            python bot.py answers
          fi

      - name: Save Questions for the Afternoon
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-save morning questions"
