name: UPSC Mains Bot

on:
  schedule:
    - cron: '30 2 * * *'   # 08:00 AM IST - Send Questions
    - cron: '30 7 * * *'   # 01:00 PM IST - Send Answers
  workflow_dispatch:
    inputs:
      mode:
        description: 'Choose mode to run manually'
        required: true
        default: 'questions'
        type: choice
        options:
          - questions
          - answers

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai

      - name: Determine Mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +"%H")
            if [ "$HOUR" -eq "02" ] || [ "$HOUR" -eq "03" ]; then
              echo "mode=questions" >> $GITHUB_OUTPUT
            else
              echo "mode=answers" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py ${{ steps.mode.outputs.mode }}

      - name: Save Questions to Repository
        if: steps.mode.outputs.mode == 'questions'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_questions.txt latest_meta.json
          git commit -m "Auto-save: questions $(date -u +%Y-%m-%d-%H%M)" || echo "No changes to commit"
          git push
